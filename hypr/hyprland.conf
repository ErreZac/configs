# Example windowrule v1
# windowrule = float, ^(kitty)$
# Example windowrule v2
# windowrulev2 = float,class:^(kitty)$,title:^(kitty)$
# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more

windowrule = match:class .*, suppress_event maximize
windowrule = match:class blueman-manager, float on
windowrule = match:class python3, float on

# windowrule = size 400 400, blueman-manager

# See https://wiki.hyprland.org/Configuring/Keywords/ for more
$mainMod = SUPER

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, Return, exec, uwsm app -- $terminal
bind = $mainMod SHIFT, C, killactive,
bind = $mainMod SHIFT, Q, exit,
# bind = $mainMod SHIFT, f, exec, $fileManager
bind = $mainMod SHIFT, f, togglefloating,
bind = $mainMod, Space, exec, uwsm app -- $menu

# bind = $mainMod, P, pseudo, # dwindle
# bind = $mainMod SHIFT, J, togglesplit, # dwindle

# for hy3 layout

# fits
bind = $mainMod, m, layoutmsg, fit active
bind = $mainMod, a, layoutmsg, fit all
bind = $mainMod, e, layoutmsg, fit toend
bind = $mainMod, b, layoutmsg, fit tobeg
bind = $mainMod, v, layoutmsg, fit visible

bind = $mainMod, h, layoutmsg, focus left
bind = $mainMod, j, movefocus, d, nowarp
bind = $mainMod, k, movefocus, u, nowarp
bind = $mainMod, l, layoutmsg, focus right
bind = $mainMod, Left, movefocus, l, nowarp
bind = $mainMod, Down, movefocus, d, nowarp
bind = $mainMod, Up, movefocus, u, nowarp
bind = $mainMod, Right, movefocus, r, nowarp

bind = $mainMod+ALT, h, movewindow, left
bind = $mainMod+ALT, j,  swapwindow, d
bind = $mainMod+ALT, k,  swapwindow, u
bind = $mainMod+ALT, l,  movewindow, right

bind = $mainMod+SHIFT, h, layoutmsg, swapcol l
bind = $mainMod+SHIFT, j, layoutmsg, swapcol r
bind = $mainMod+SHIFT, k, layoutmsg, swapcol l
bind = $mainMod+SHIFT, l, layoutmsg, swapcol r

bind = $mainMod+SHIFT, Period, layoutmsg, promote


bind = $mainMod CONTROL, h, layoutmsg, colresize -0.1
bind = $mainMod CONTROL, l, layoutmsg, colresize +0.1
bind = $mainMod CONTROL, j, layoutmsg, colresize -0.1
bind = $mainMod CONTROL, k, layoutmsg, colresize +0.1

# for master layout
# bind = $mainMod, j, layoutmsg, cyclenext
# bind = $mainMod, k, layoutmsg, cycleprev
# bind = $mainMod SHIFT, k, layoutmsg, swapprev
# bind = $mainMod SHIFT, j, layoutmsg, swapnext

bind = $mainMod SHIFT, m, fullscreen, 0

bind = $mainMod SHIFT, r, exec, ~/.config/waybar/launch.sh
bind = $mainMod, p, exec, uwsm app -- grim -g "$(slurp -d)" - | wl-copy
bind = $mainMod SHIFT, p,  exec, /home/zac/.config/sway/cycle_profiles.sh
bind = $mainMod CTRL, p, exec, bash -c 'filename=$(wofi -d --allow-empty --lines 1 --prompt "Enter the screenshot name:"); slurp -d | grim -g - ~/Pictures/Screenshots/$filename.png'

# Pyprland
# bind = $mainMod SHIFT, Return, exec, pypr toggle term

#Function Keys Bindings
binde =, XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_SINK@ 5%+
binde =, XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_SINK@ 5%-
binde =, XF86AudioMute, exec, wpctl set-mute @DEFAULT_SINK@ toggle
binde =, XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_SOURCE@ toggle
binde =SHIFT, XF86AudioRaiseVolume, exec, pactl set-source-volume @DEFAULT_SOURCE@ +5%
binde =SHIFT, XF86AudioLowerVolume, exec, pactl set-source-volume @DEFAULT_SOURCE@ -5%
bind =, XF86AudioPlay, exec, playerctl play-pause
bind =, XF86AudioPause, exec, playerctl play-pause
bind =, XF86AudioNext, exec, playerctl next
bind =, XF86AudioPrev, exec, playerctl previous
bind =, XF86MonBrightnessUp, exec, brightnessctl -d intel_backlight s +10%
bind =, XF86MonBrightnessDown, exec, brightnessctl -d intel_backlight s 10%-

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9

# Example special workspace (scratchpad)
bind = $mainMod, Comma, togglespecialworkspace, magic
bind = $mainMod SHIFT, Comma, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bind = $mainMod SHIFT CONTROL, q, exec, poweroff
bind = $mainMod CONTROL SHIFT, l, exec, hyprlock & disown; systemctl suspend
# bind = $mainMod, Tab, hyprexpo:expo, toggle # can be: toggle, off/disable or on/enable

bind = $mainMod SHIFT, o, exec, uwsm app -- kitty nvim /home/zac/Documents/Editor/editor_work.md
bind = $mainMod SHIFT, t, exec, uwsm app -- kitty nvim /home/zac/Documents/todo_list.md


